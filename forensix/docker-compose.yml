version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: forensix_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: forensix
      POSTGRES_PASSWORD: forensix_secure_pw
      POSTGRES_DB: forensix_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U forensix"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: forensix_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://forensix:forensix_secure_pw@db:5432/forensix_db
      - PYTHONPATH=/app
    volumes:
      - ./storage:/app/storage
      # Mount firebase credentials if you have them:
      # - ./firebase-credentials.json:/app/firebase-credentials.json:ro
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: forensix_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:8000
      - VITE_FIREBASE_API_KEY=${VITE_FIREBASE_API_KEY:-}
      - VITE_FIREBASE_AUTH_DOMAIN=${VITE_FIREBASE_AUTH_DOMAIN:-}
      - VITE_FIREBASE_PROJECT_ID=${VITE_FIREBASE_PROJECT_ID:-}
    depends_on:
      - backend

volumes:
  postgres_data:
